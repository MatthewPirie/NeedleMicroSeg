extractor:
  name: full_frame_resize
  kwargs:
    out_hw: [256, 256]

normalization:
  name: zscore_per_image

augmentations:
  enabled: []
  kwargs: {}

data:
  split_id: kfold_cv_fold-0

train:
  batch_size: 8
  epochs: 100
  steps_per_epoch: 250
  log_every: 50
  optimizer: adam
  lr: 0.0001
  weight_decay: 0.00001
  momentum: 0.99
  lr_scheduler: none
  min_lr: 0.000001
  poly_power: 0.9

loss:
  w_bce: 1.0
  w_dice: 1.0
  batch_dice: true