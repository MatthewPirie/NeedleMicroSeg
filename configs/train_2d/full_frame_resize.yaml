extractor:
  name: full_frame_resize
  kwargs:
    out_hw: [256, 256]

normalization:
  name: zscore_per_image

augmentations:
  enabled: []
  kwargs: {}

data:
  split_id: kfold_cv_fold-0

train:
  batch_size: 8
  epochs: 100
  lr: 0.0001
  weight_decay: 0.00001
  num_workers: 8

loss:
  w_bce: 1.0
  w_dice: 1.0